              ${item['开始时间'] ? '开始：' + Utils.escapeHtml(Utils.formatDateShort(item['开始时间'])) : ''}
              ${item['持续时间描述'] ? ' | ' + Utils.escapeHtml(item['持续时间描述']) : ''}
            </div>
            ${(item['标签'] || []).length > 0 ? '<div style="margin-top:6px;">' + item['标签'].map(t => '<span class="tag">' + Utils.escapeHtml(t) + '</span>').join('') + '</div>' : ''}
            <div class="list-item-detail">
              ${renderBehaviorDetail(item)}
            </div>
          </div>`;
      });
    }

    html += '</div>';
    setPage(html);
    bindBehaviorEvents();
  }

  function getStatusBadge(status) {
    const map = {
      '持续推进': 'badge-green',
      '中断': 'badge-yellow',
      '已放弃': 'badge-red',
      '已完成': 'badge-cyan'
    };
    return '<span class="badge ' + (map[status] || 'badge-cyan') + '">' + Utils.escapeHtml(status || '未知') + '</span>';
  }

  function getCategoryBadge(category) {
    const map = {
      '学习': 'badge-cyan',
      '工作': 'badge-magenta',
      '运动': 'badge-green',
      '创作': 'badge-yellow',
      '社交': 'badge-orange'
    };
    return '<span class="badge ' + (map[category] || 'badge-cyan') + '">' + Utils.escapeHtml(category || '其他') + '</span>';
  }

  function renderBehaviorDetail(item) {
    let html = '';

    // 中断分析
    const interrupt = item['中断分析'];
    if (interrupt) {
      html += '<div class="mb-16" style="padding:12px;background:rgba(255,204,0,0.04);border:1px solid rgba(255,204,0,0.15);border-radius:var(--radius-sm);">';
      html += '<strong class="text-yellow" style="font-size:0.85rem;">中断分析</strong>';
      const events = interrupt['中断前发生了什么'] || [];
      if (events.length > 0) {
        html += '<div style="margin-top:8px;">';
        events.forEach(e => {
          html += `<div style="font-size:0.85rem;margin-top:4px;padding:6px;background:rgba(0,0,0,0.2);border-radius:var(--radius-sm);">
            <span class="text-muted">${Utils.escapeHtml(e['时间'] || '')}</span> - ${Utils.escapeHtml(e['事件'] || '')}
            ${e['影响'] ? '<br><span class="text-secondary" style="font-size:0.8rem;">影响：' + Utils.escapeHtml(e['影响']) + '</span>' : ''}
          </div>`;
        });
        html += '</div>';
      }
      if (interrupt['中断根本原因']) {
        html += `<div style="margin-top:8px;font-size:0.85rem;">根本原因：${Utils.escapeHtml(interrupt['中断根本原因'])}</div>`;
      }
      html += '</div>';
    }

    // 放弃分析
    const abandon = item['放弃分析'];
    if (abandon) {
      html += '<div class="mb-16" style="padding:12px;background:rgba(255,51,102,0.04);border:1px solid rgba(255,51,102,0.15);border-radius:var(--radius-sm);">';
      html += '<strong class="text-red" style="font-size:0.85rem;">放弃分析</strong>';
      if (typeof abandon === 'object') {
        Object.entries(abandon).forEach(([k, v]) => {
          if (v) html += `<div style="margin-top:4px;font-size:0.85rem;">${Utils.escapeHtml(k)}：${Utils.escapeHtml(v)}</div>`;
        });
      }
      html += '</div>';
    }

    // 经验总结
    if (item['经验总结']) {
      html += `<div class="mb-8" style="font-size:0.85rem;"><strong class="text-green">经验总结：</strong>${Utils.escapeHtml(item['经验总结'])}</div>`;
    }

    // 操作按钮
    html += `
      <div class="btn-group mt-16">
        <button class="btn btn-sm" data-action="edit-behavior" data-id="${item.id}">编辑</button>
        <button class="btn btn-sm btn-danger" data-action="delete-behavior" data-id="${item.id}">删除</button>
      </div>`;

    return html;
  }

  function bindBehaviorEvents() {
    // 展开/折叠
    document.querySelectorAll('.behavior-item').forEach(item => {
      item.querySelector('.list-item-header').addEventListener('click', (e) => {
        if (e.target.closest('.list-item-actions')) return;
        item.classList.toggle('expanded');
      });
    });

    // 新增
    document.getElementById('add-behavior').addEventListener('click', () => {
      openBehaviorModal(null);
    });

    // 编辑/删除
    document.querySelectorAll('[data-action="edit-behavior"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const data = BehaviorObserver.getAll();
        const item = data.items.find(i => i.id === btn.dataset.id);
        if (item) openBehaviorModal(item);
      });
    });

    document.querySelectorAll('[data-action="delete-behavior"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const confirmed = await Utils.showConfirm('确定要删除这条行为记录吗？');
        if (confirmed) {
          BehaviorObserver.remove(btn.dataset.id);
          Utils.showToast('已删除', 'success');
          renderBehaviorObserver();
        }
      });
    });

    // 搜索
    const filterInput = document.getElementById('behavior-filter');
    if (filterInput) {
      filterInput.addEventListener('input', Utils.debounce(() => {
        const keyword = filterInput.value.trim().toLowerCase();
        document.querySelectorAll('.behavior-item').forEach(item => {
          const text = item.textContent.toLowerCase();
          item.style.display = !keyword || text.includes(keyword) ? '' : 'none';
        });
      }, 200));
    }

    // 状态筛选
    const statusFilter = document.getElementById('behavior-status-filter');
    if (statusFilter) {
      statusFilter.addEventListener('change', () => {
        const val = statusFilter.value;
        document.querySelectorAll('.behavior-item').forEach(item => {
          if (!val) { item.style.display = ''; return; }
          item.style.display = item.dataset.status === val ? '' : 'none';
        });
      });
    }
  }

  function openBehaviorModal(existingItem) {
    const isEdit = !!existingItem;
    const title = isEdit ? '编辑行为记录' : '新增行为记录';
    const interruptEvents = (isEdit && existingItem['中断分析']) ? (existingItem['中断分析']['中断前发生了什么'] || []) : [];

    let bodyHtml = `<form id="behavior-form">
      <div class="form-group">
        <label class="form-label">事情 *</label>
        <input class="form-input" name="事情" value="${Utils.escapeHtml(isEdit ? existingItem['事情'] : '')}" placeholder="你在做什么事">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">类别</label>
          <select class="form-select" name="类别">
            <option${(isEdit && existingItem['类别'] === '学习') ? ' selected' : ''}>学习</option>
            <option${(isEdit && existingItem['类别'] === '工作') ? ' selected' : ''}>工作</option>
            <option${(isEdit && existingItem['类别'] === '运动') ? ' selected' : ''}>运动</option>
            <option${(isEdit && existingItem['类别'] === '创作') ? ' selected' : ''}>创作</option>
            <option${(isEdit && existingItem['类别'] === '社交') ? ' selected' : ''}>社交</option>
            <option${(isEdit && existingItem['类别'] === '其他') ? ' selected' : ''}>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">状态</label>
          <select class="form-select" name="状态">
            <option${(isEdit && existingItem['状态'] === '持续推进') ? ' selected' : ''}>持续推进</option>
            <option${(isEdit && existingItem['状态'] === '中断') ? ' selected' : ''}>中断</option>
            <option${(isEdit && existingItem['状态'] === '已放弃') ? ' selected' : ''}>已放弃</option>
            <option${(isEdit && existingItem['状态'] === '已完成') ? ' selected' : ''}>已完成</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">开始时间</label>
          <input class="form-input" name="开始时间" value="${Utils.escapeHtml(isEdit ? existingItem['开始时间'] : '')}" placeholder="YYYY-MM-DD">
        </div>
        <div class="form-group">
          <label class="form-label">结束时间</label>
          <input class="form-input" name="结束时间" value="${Utils.escapeHtml(isEdit ? existingItem['结束时间'] : '')}" placeholder="YYYY-MM-DD">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">持续时间描述</label>
        <input class="form-input" name="持续时间描述" value="${Utils.escapeHtml(isEdit ? existingItem['持续时间描述'] : '')}" placeholder="如：3个月、持续中">
      </div>

      <div class="form-group">
        <label class="form-label">中断分析 - 中断前发生了什么</label>
        <div id="interrupt-events-container">`;

    interruptEvents.forEach((e, i) => {
      bodyHtml += `
        <div class="sub-item-row" data-index="${i}">
          <input class="form-input" name="ie_time_${i}" value="${Utils.escapeHtml(e['时间'] || '')}" placeholder="时间" style="flex:0 0 120px;">
          <input class="form-input" name="ie_event_${i}" value="${Utils.escapeHtml(e['事件'] || '')}" placeholder="事件">
          <input class="form-input" name="ie_impact_${i}" value="${Utils.escapeHtml(e['影响'] || '')}" placeholder="影响" style="flex:0 0 120px;">
          <button type="button" class="btn-remove-sub" onclick="this.closest('.sub-item-row').remove()">&times;</button>
        </div>`;
    });

    bodyHtml += `
        </div>
        <button type="button" class="btn-add-sub" id="add-interrupt-event">+ 添加事件</button>
      </div>
      <div class="form-group">
        <label class="form-label">中断根本原因</label>
        <textarea class="form-textarea" name="中断根本原因" placeholder="分析中断的根本原因">${Utils.escapeHtml(isEdit && existingItem['中断分析'] ? existingItem['中断分析']['中断根本原因'] : '')}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">经验总结</label>
        <textarea class="form-textarea" name="经验总结" placeholder="从这次行为中总结的经验">${Utils.escapeHtml(isEdit ? existingItem['经验总结'] : '')}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">标签（逗号分隔）</label>
        <input class="form-input" name="标签" value="${Utils.escapeHtml(isEdit ? (existingItem['标签'] || []).join(', ') : '')}" placeholder="如：编程, 阅读">
      </div>
    </form>`;

    const footerHtml = `
      <button class="btn" id="modal-cancel-btn">取消</button>
      <button class="btn btn-primary" id="modal-save-btn">${isEdit ? '保存修改' : '添加记录'}</button>
    `;

    showModal(title, bodyHtml, footerHtml);

    // 添加中断事件
    document.getElementById('add-interrupt-event').onclick = () => {
      const container = document.getElementById('interrupt-events-container');
      const count = container.querySelectorAll('.sub-item-row').length;
      const row = document.createElement('div');
      row.className = 'sub-item-row';
      row.innerHTML = `
        <input class="form-input" name="ie_time_${count}" value="" placeholder="时间" style="flex:0 0 120px;">
        <input class="form-input" name="ie_event_${count}" value="" placeholder="事件">
        <input class="form-input" name="ie_impact_${count}" value="" placeholder="影响" style="flex:0 0 120px;">
        <button type="button" class="btn-remove-sub" onclick="this.closest('.sub-item-row').remove()">&times;</button>
      `;
      container.appendChild(row);
    };

    document.getElementById('modal-cancel-btn').onclick = hideModal;
    document.getElementById('modal-save-btn').onclick = () => {
      const form = document.getElementById('behavior-form');
      const thingVal = form.querySelector('[name="事情"]').value.trim();
      if (!thingVal) {
        Utils.showToast('事情为必填项', 'error');
        form.querySelector('[name="事情"]').style.borderColor = 'var(--neon-red)';
        return;
      }

      // 收集中断事件
      const ieRows = form.querySelectorAll('#interrupt-events-container .sub-item-row');
      const ieEvents = [];
      ieRows.forEach(row => {
        const time = row.querySelector('input[name^="ie_time"]').value.trim();
        const event = row.querySelector('input[name^="ie_event"]').value.trim();
        const impact = row.querySelector('input[name^="ie_impact"]').value.trim();
        if (event) ieEvents.push({ '时间': time, '事件': event, '影响': impact });
      });

      const rootCause = form.querySelector('[name="中断根本原因"]').value.trim();
      const status = form.querySelector('[name="状态"]').value;
      const hasInterrupt = ieEvents.length > 0 || rootCause;

      const tagsStr = form.querySelector('[name="标签"]').value.trim();
      const tags = tagsStr ? tagsStr.split(/[,，]/).map(t => t.trim()).filter(Boolean) : [];

      const data = {
        '事情': thingVal,
        '类别': form.querySelector('[name="类别"]').value,
        '状态': status,
        '开始时间': form.querySelector('[name="开始时间"]').value.trim(),
        '结束时间': form.querySelector('[name="结束时间"]').value.trim(),
        '持续时间描述': form.querySelector('[name="持续时间描述"]').value.trim(),
        '中断分析': hasInterrupt ? { '中断前发生了什么': ieEvents, '中断根本原因': rootCause } : null,
        '放弃分析': status === '已放弃' ? (isEdit && existingItem['放弃分析'] ? existingItem['放弃分析'] : { '原因': '待补充' }) : null,
        '经验总结': form.querySelector('[name="经验总结"]').value.trim(),
        '标签': tags
      };

      if (isEdit) {
        BehaviorObserver.update(existingItem.id, data);
        Utils.showToast('记录已更新', 'success');
      } else {
        BehaviorObserver.add(data);
        Utils.showToast('记录已添加', 'success');
      }
      hideModal();
      renderBehaviorObserver();
    };
  }

  // ---- 数据管理视图 ----

  function renderDataIO() {
    const keys = Store.keys();
    let html = `
      <div class="page-header">
        <div class="page-title">数据管理</div>
        <div class="page-desc">导入导出你的数据，管理本地存储</div>
      </div>

      <div class="card">
        <div class="card-title"><span class="icon">&#128202;</span> 数据统计</div>
        <div class="data-stats">`;

    keys.forEach(key => {
      const data = Store.get(key);
      let size = '0';
      if (data) {
        const json = JSON.stringify(data);
        size = (json.length / 1024).toFixed(1) + ' KB';
      }
      let count = '-';
      if (data && typeof data === 'object') {
        if (Array.isArray(data)) count = data.length;
        else if (data.items) count = data.items.length;
        else if (data.chains) count = data.chains.length;
        else count = Object.keys(data).length;
      }
      html += `
        <div class="data-stat-item">
          <div class="data-stat-key">lifeos:${Utils.escapeHtml(key)}</div>
          <div class="data-stat-value">${count} 条</div>
          <div class="text-muted" style="font-size:0.75rem;margin-top:4px;">${size}</div>
        </div>`;
    });

    html += `
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="card">
          <div class="card-title"><span class="icon">&#128228;</span> 导出数据</div>
          <p class="text-secondary" style="font-size:0.85rem;margin-bottom:16px;">将所有数据导出为JSON文件，可用于备份或迁移。</p>
          <button class="btn btn-primary" id="btn-export">导出全部数据</button>
        </div>
        <div class="card">
          <div class="card-title"><span class="icon">&#128229;</span> 导入数据</div>
          <p class="text-secondary" style="font-size:0.85rem;margin-bottom:16px;">从JSON文件导入数据。请选择导入方式。</p>
          <input type="file" id="import-file" accept=".json" style="display:none;">
          <button class="btn btn-primary" id="btn-import-select">选择文件</button>
          <div class="import-options" id="import-options" style="display:none;">
            <h4>导入方式</h4>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="import-mode" value="overwrite" checked>
                完全覆盖（清除现有数据）
              </label>
              <label class="radio-label">
                <input type="radio" name="import-mode" value="merge">
                合并（保留现有数据，添加新数据）
              </label>
            </div>
            <div class="mt-16">
              <button class="btn btn-success" id="btn-import-confirm">确认导入</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card mt-16">
        <div class="card-title"><span class="icon">&#128465;</span> 清除数据</div>
        <p class="text-secondary" style="font-size:0.85rem;margin-bottom:16px;">清除所有LifeOS数据，此操作不可撤销。</p>
        <button class="btn btn-danger" id="btn-clear-all">清除所有数据</button>
      </div>`;

    setPage(html);
    bindDataIOEvents();
  }

  function bindDataIOEvents() {
    // 导出
    document.getElementById('btn-export').addEventListener('click', () => {
      const exportData = {};
      Store.keys().forEach(key => {
        exportData[key] = Store.get(key);
      });

      const json = JSON.stringify(exportData, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'lifeos_backup_' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      Utils.showToast('数据已导出', 'success');
    });

    // 选择导入文件
    let pendingImportData = null;
    document.getElementById('btn-import-select').addEventListener('click', () => {
      document.getElementById('import-file').click();
    });

    document.getElementById('import-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          pendingImportData = JSON.parse(ev.target.result);
          document.getElementById('import-options').style.display = 'block';
          Utils.showToast('文件已加载，请选择导入方式', 'info');
        } catch (err) {
          Utils.showToast('文件格式错误，请选择有效的JSON文件', 'error');
        }
      };
      reader.readAsText(file);
    });

    // 确认导入
    document.getElementById('btn-import-confirm').addEventListener('click', async () => {
      if (!pendingImportData) return;

      const mode = document.querySelector('input[name="import-mode"]:checked').value;
      const confirmed = await Utils.showConfirm(
        mode === 'overwrite'
          ? '完全覆盖将清除所有现有数据，确定继续吗？'
          : '将以合并方式导入数据，确定继续吗？'
      );

      if (!confirmed) return;

      if (mode === 'overwrite') {
        Store.keys().forEach(key => Store.remove(key));
      }

      Object.entries(pendingImportData).forEach(([key, value]) => {
        if (mode === 'merge') {
          const existing = Store.get(key);
          if (existing && typeof existing === 'object' && !Array.isArray(existing)) {
            if (existing.items && Array.isArray(value.items)) {
              // 合并items数组
              const existingIds = new Set(existing.items.map(i => i.id));
              value.items.forEach(item => {
                if (!existingIds.has(item.id)) {
                  existing.items.push(item);
                }
              });
              Store.set(key, existing);
            } else if (existing.chains && Array.isArray(value.chains)) {
              const existingIds = new Set(existing.chains.map(c => c.id));
              value.chains.forEach(chain => {
                if (!existingIds.has(chain.id)) {
                  existing.chains.push(chain);
                }
              });
              Store.set(key, existing);
            } else {
              // 简单对象合并
              Store.set(key, { ...existing, ...value });
            }
          } else {
            Store.set(key, value);
          }
        } else {
          Store.set(key, value);
        }
      });

      Store.flush();
      pendingImportData = null;
      document.getElementById('import-options').style.display = 'none';
      document.getElementById('import-file').value = '';
      Utils.showToast('数据导入成功', 'success');
      renderDataIO();
    });

    // 清除所有数据
    document.getElementById('btn-clear-all').addEventListener('click', async () => {
      const confirmed = await Utils.showConfirm('确定要清除所有LifeOS数据吗？此操作不可撤销！');
      if (confirmed) {
        Store.keys().forEach(key => Store.remove(key));
        Utils.showToast('所有数据已清除', 'success');
        renderDataIO();
      }
    });
  }

  return {
    renderDashboard,
    renderUserModel,
    renderDecisionLog,
    renderThoughtChain,
    renderBehaviorObserver,
    renderDataIO
  };
  })();

  // ============================================
  // 应用入口：App
  // ============================================

  const App = (() => {
    function init() {
      // 注册路由
      Router.register('dashboard', UI.renderDashboard);
      Router.register('user-model', UI.renderUserModel);
      Router.register('decisions', UI.renderDecisionLog);
      Router.register('thoughts', UI.renderThoughtChain);
      Router.register('behaviors', UI.renderBehaviorObserver);
      Router.register('data-io', UI.renderDataIO);

      // 导航点击事件
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          Router.navigate(item.dataset.route);
          // 移动端关闭侧边栏
          document.getElementById('sidebar').classList.remove('open');
        });
      });

      // 移动端汉堡菜单
      document.getElementById('hamburger-btn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
      });

      // Ctrl+S 保存
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          Store.flush();
          Utils.showToast('所有数据已保存', 'success');
        }
      });

      // 点击页面外关闭侧边栏（移动端）
      document.getElementById('main-content').addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          document.getElementById('sidebar').classList.remove('open');
        }
      });

      // ESC关闭弹窗
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          hideModal();
          document.getElementById('confirm-overlay').classList.remove('active');
        }
      });

      // 初始化路由
      Router.init();

      console.log('LifeOS initialized');
    }

    return { init };
  })();

  // 暴露到全局
  window.LifeOS = {
    Store, EventBus, Router, Utils,
    UserModel, DecisionLog, ThoughtChain, BehaviorObserver, Dashboard,
    UI, App
  };

  // 启动应用
  document.addEventListener('DOMContentLoaded', App.init);
