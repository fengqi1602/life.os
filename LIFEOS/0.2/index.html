  function renderDecisionDetail(item) {
    let html = '';

    // 原因层级
    const reasons = item['原因'] || [];
    if (reasons.length > 0) {
      html += '<div class="mb-16"><strong class="text-cyan" style="font-size:0.85rem;">决策原因：</strong>';
      reasons.sort((a, b) => a['层级'] - b['层级']).forEach(r => {
        html += `<div style="margin-top:6px;padding-left:${(r['层级'] || 1) * 16}px;font-size:0.85rem;">
          <span class="badge badge-cyan">层级${r['层级']}</span> ${Utils.escapeHtml(r['描述'])}
        </div>`;
      });
      html += '</div>';
    }

    // 结果
    if (item['结果']) {
      html += `<div class="mb-8"><strong class="text-secondary" style="font-size:0.85rem;">结果：</strong><span style="font-size:0.85rem;">${Utils.escapeHtml(item['结果'])}</span></div>`;
    }

    // 复盘
    const review = item['复盘'];
    if (review) {
      html += '<div class="mb-8" style="padding:12px;background:rgba(255,255,255,0.02);border-radius:var(--radius-sm);border:1px solid var(--border);">';
      html += '<strong class="text-yellow" style="font-size:0.85rem;">复盘</strong>';
      if (review['决策质量']) html += `<div style="margin-top:6px;font-size:0.85rem;">决策质量：<span class="badge badge-yellow">${Utils.escapeHtml(review['决策质量'])}</span></div>`;
      if (review['学到了什么']) html += `<div style="margin-top:4px;font-size:0.85rem;">学到了：${Utils.escapeHtml(review['学到了什么'])}</div>`;
      if (review['下次会怎么做']) html += `<div style="margin-top:4px;font-size:0.85rem;">下次会做：${Utils.escapeHtml(review['下次会怎么做'])}</div>`;
      html += '</div>';
    }

    // 操作按钮
    html += `
      <div class="btn-group mt-16">
        <button class="btn btn-sm" data-action="edit-decision" data-id="${item.id}">编辑</button>
        <button class="btn btn-sm btn-danger" data-action="delete-decision" data-id="${item.id}">删除</button>
      </div>`;

    return html;
  }

  function getEvalBadge(evalText) {
    const map = {
      '待观察': 'badge-yellow',
      '效果好': 'badge-green',
      '效果一般': 'badge-orange',
      '效果差': 'badge-red',
      '未评价': 'badge-cyan'
    };
    const cls = map[evalText] || 'badge-cyan';
    return `<span class="badge ${cls}">${Utils.escapeHtml(evalText || '未评价')}</span>`;
  }

  function bindDecisionEvents() {
    // 展开/折叠
    document.querySelectorAll('.decision-item').forEach(item => {
      item.querySelector('.list-item-header').addEventListener('click', (e) => {
        if (e.target.closest('.list-item-actions')) return;
        item.classList.toggle('expanded');
      });
    });

    // 新增
    document.getElementById('add-decision').addEventListener('click', () => {
      openDecisionModal(null);
    });

    // 编辑/删除
    document.querySelectorAll('[data-action="edit-decision"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const item = DecisionLog.getById(btn.dataset.id);
        if (item) openDecisionModal(item);
      });
    });

    document.querySelectorAll('[data-action="delete-decision"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const confirmed = await Utils.showConfirm('确定要删除这条决策记录吗？');
        if (confirmed) {
          DecisionLog.remove(btn.dataset.id);
          Utils.showToast('已删除', 'success');
          renderDecisionLog();
        }
      });
    });

    // 搜索
    const filterInput = document.getElementById('decision-filter');
    if (filterInput) {
      filterInput.addEventListener('input', Utils.debounce(() => {
        const keyword = filterInput.value.trim().toLowerCase();
        document.querySelectorAll('.decision-item').forEach(item => {
          const text = item.textContent.toLowerCase();
          item.style.display = !keyword || text.includes(keyword) ? '' : 'none';
        });
      }, 200));
    }
  }

  function openDecisionModal(existingItem) {
    const isEdit = !!existingItem;
    const title = isEdit ? '编辑决策' : '新增决策';
    const reasons = isEdit ? (existingItem['原因'] || []) : [];

    let bodyHtml = `<form id="decision-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">时间 *</label>
          <input class="form-input" type="text" name="时间" value="${Utils.escapeHtml(isEdit ? existingItem['时间'] : Utils.todayStr())}" placeholder="YYYY-MM-DD HH:MM">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">事件 *</label>
        <input class="form-input" name="事件" value="${Utils.escapeHtml(isEdit ? existingItem['事件'] : '')}" placeholder="发生了什么事">
      </div>
      <div class="form-group">
        <label class="form-label">决定 *</label>
        <textarea class="form-textarea" name="决定" placeholder="你做了什么决定">${Utils.escapeHtml(isEdit ? existingItem['决定'] : '')}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">决策原因</label>
        <div id="reasons-container">`;

    reasons.forEach((r, i) => {
      bodyHtml += `
        <div class="sub-item-row" data-index="${i}">
          <select class="form-select" name="reason_level_${i}" style="flex:0 0 80px;">
            <option value="1"${r['层级'] === 1 ? ' selected' : ''}>层级1</option>
            <option value="2"${r['层级'] === 2 ? ' selected' : ''}>层级2</option>
            <option value="3"${r['层级'] === 3 ? ' selected' : ''}>层级3</option>
            <option value="4"${r['层级'] === 4 ? ' selected' : ''}>层级4</option>
            <option value="5"${r['层级'] === 5 ? ' selected' : ''}>层级5</option>
          </select>
          <input class="form-input" name="reason_desc_${i}" value="${Utils.escapeHtml(r['描述'] || '')}" placeholder="原因描述">
          <button type="button" class="btn-remove-sub" onclick="this.closest('.sub-item-row').remove()">&times;</button>
        </div>`;
    });

    bodyHtml += `
        </div>
        <button type="button" class="btn-add-sub" id="add-reason">+ 添加原因</button>
      </div>

      <div class="form-group">
        <label class="form-label">结果</label>
        <textarea class="form-textarea" name="结果" placeholder="决策产生的结果">${Utils.escapeHtml(isEdit ? existingItem['结果'] : '')}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">结果评价</label>
          <select class="form-select" name="结果评价">
            <option${(isEdit && existingItem['结果评价'] === '待观察') ? ' selected' : ''}>待观察</option>
            <option${(isEdit && existingItem['结果评价'] === '效果好') ? ' selected' : ''}>效果好</option>
            <option${(isEdit && existingItem['结果评价'] === '效果一般') ? ' selected' : ''}>效果一般</option>
            <option${(isEdit && existingItem['结果评价'] === '效果差') ? ' selected' : ''}>效果差</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">复盘 - 决策质量</label>
        <select class="form-select" name="复盘.决策质量">
          <option value="">未评价</option>
          <option${(isEdit && existingItem['复盘'] && existingItem['复盘']['决策质量'] === '优秀') ? ' selected' : ''}>优秀</option>
          <option${(isEdit && existingItem['复盘'] && existingItem['复盘']['决策质量'] === '良好') ? ' selected' : ''}>良好</option>
          <option${(isEdit && existingItem['复盘'] && existingItem['复盘']['决策质量'] === '一般') ? ' selected' : ''}>一般</option>
          <option${(isEdit && existingItem['复盘'] && existingItem['复盘']['决策质量'] === '较差') ? ' selected' : ''}>较差</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">复盘 - 学到了什么</label>
        <textarea class="form-textarea" name="复盘.学到了什么" placeholder="从这次决策中学到了什么">${Utils.escapeHtml(isEdit && existingItem['复盘'] ? existingItem['复盘']['学到了什么'] : '')}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">复盘 - 下次会怎么做</label>
        <textarea class="form-textarea" name="复盘.下次会怎么做" placeholder="如果再遇到类似情况会怎么做">${Utils.escapeHtml(isEdit && existingItem['复盘'] ? existingItem['复盘']['下次会怎么做'] : '')}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">标签（逗号分隔）</label>
        <input class="form-input" name="标签" value="${Utils.escapeHtml(isEdit ? (existingItem['标签'] || []).join(', ') : '')}" placeholder="如：职业, 学习, 投资">
      </div>
    </form>`;

    const footerHtml = `
      <button class="btn" id="modal-cancel-btn">取消</button>
      <button class="btn btn-primary" id="modal-save-btn">${isEdit ? '保存修改' : '添加决策'}</button>
    `;

    showModal(title, bodyHtml, footerHtml);

    // 添加原因
    document.getElementById('add-reason').onclick = () => {
      const container = document.getElementById('reasons-container');
      const count = container.querySelectorAll('.sub-item-row').length;
      const row = document.createElement('div');
      row.className = 'sub-item-row';
      row.innerHTML = `
        <select class="form-select" name="reason_level_${count}" style="flex:0 0 80px;">
          <option value="1">层级1</option><option value="2">层级2</option><option value="3">层级3</option><option value="4">层级4</option><option value="5">层级5</option>
        </select>
        <input class="form-input" name="reason_desc_${count}" value="" placeholder="原因描述">
        <button type="button" class="btn-remove-sub" onclick="this.closest('.sub-item-row').remove()">&times;</button>
      `;
      container.appendChild(row);
    };

    document.getElementById('modal-cancel-btn').onclick = hideModal;
    document.getElementById('modal-save-btn').onclick = () => {
      const form = document.getElementById('decision-form');
      const eventVal = form.querySelector('[name="事件"]').value.trim();
      const decisionVal = form.querySelector('[name="决定"]').value.trim();

      if (!eventVal || !decisionVal) {
        Utils.showToast('事件和决定为必填项', 'error');
        if (!eventVal) form.querySelector('[name="事件"]').style.borderColor = 'var(--neon-red)';
        if (!decisionVal) form.querySelector('[name="决定"]').style.borderColor = 'var(--neon-red)';
        return;
      }

      // 收集原因
      const reasonRows = form.querySelectorAll('#reasons-container .sub-item-row');
      const reasons = [];
      reasonRows.forEach(row => {
        const level = parseInt(row.querySelector('select').value) || 1;
        const desc = row
.querySelector('input[name^="reason_desc"]').value.trim();
        if (desc) reasons.push({ '层级': level, '描述': desc });
      });

      // 收集复盘
      const reviewQuality = form.querySelector('[name="复盘.决策质量"]').value;
      const reviewLearn = form.querySelector('[name="复盘.学到了什么"]').value.trim();
      const reviewNext = form.querySelector('[name="复盘.下次会怎么做"]').value.trim();
      const review = {};
      if (reviewQuality) review['决策质量'] = reviewQuality;
      if (reviewLearn) review['学到了什么'] = reviewLearn;
      if (reviewNext) review['下次会怎么做'] = reviewNext;

      // 收集标签
      const tagsStr = form.querySelector('[name="标签"]').value.trim();
      const tags = tagsStr ? tagsStr.split(/[,，]/).map(t => t.trim()).filter(Boolean) : [];

      const data = {
        '时间': form.querySelector('[name="时间"]').value.trim(),
        '事件': eventVal,
        '决定': decisionVal,
        '原因': reasons,
        '结果': form.querySelector('[name="结果"]').value.trim(),
        '结果评价': form.querySelector('[name="结果评价"]').value,
        '复盘': Object.keys(review).length > 0 ? review : null,
        '标签': tags
      };

      if (isEdit) {
        DecisionLog.update(existingItem.id, data);
        Utils.showToast('决策已更新', 'success');
      } else {
        DecisionLog.add(data);
        Utils.showToast('决策已添加', 'success');
      }
      hideModal();
      renderDecisionLog();
    };
  }

  // ---- 思路演化链视图 ----

  function renderThoughtChain() {
    const data = ThoughtChain.getAll();
    const chains = data.chains || [];

    let html = `
      <div class="page-header">
        <div class="page-title">思路演化链</div>
        <div class="page-desc">追踪你的思考过程，从问题到结论的完整演化路径</div>
      </div>
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="filter-input" id="thought-filter" placeholder="搜索标题...">
        </div>
        <div class="toolbar-right">
          <button class="btn btn-primary" id="add-chain">+ 新建思路链</button>
        </div>
      </div>
      <div id="chain-list">`;

    if (chains.length === 0) {
      html += `<div class="empty-state"><div class="empty-state-icon">&#128279;</div><div class="empty-state-text">暂无思路链，点击上方按钮开始记录你的思考</div></div>`;
    } else {
      chains.forEach(chain => {
        const statusBadge = chain['状态'] === '已完成' ? 'badge-green' : 'badge-yellow';
        html += `
          <div class="card">
            <div class="list-item-header" style="margin-bottom:12px;">
              <div class="list-item-title">
                <span class="text-cyan" style="font-size:1.05rem;">${Utils.escapeHtml(chain['标题'] || '未命名思路链')}</span>
                <span class="badge ${statusBadge}" style="margin-left:8px;">${Utils.escapeHtml(chain['状态'] || '进行中')}</span>
              </div>
              <div class="list-item-actions">
                <button class="btn btn-sm" data-action="edit-chain" data-id="${chain.id}">编辑</button>
                <button class="btn btn-sm btn-danger" data-action="delete-chain" data-id="${chain.id}">删除</button>
              </div>
            </div>
            ${(chain['标签'] || []).length > 0 ? '<div style="margin-bottom:12px;">' + chain['标签'].map(t => '<span class="tag">' + Utils.escapeHtml(t) + '</span>').join('') + '</div>' : ''}

            ${renderChainNodes(chain)}

            ${chain['结论'] ? '<div class="chain-conclusion"><div class="chain-conclusion-title">结论</div><div>' + Utils.escapeHtml(chain['结论']) + '</div></div>' : ''}

            <div class="btn-group mt-16">
              <button class="btn btn-sm btn-primary" data-action="add-node" data-chain-id="${chain.id}">+ 添加节点</button>
            </div>
          </div>`;
      });
    }

    html += '</div>';
    setPage(html);
    bindThoughtEvents();
  }

  function renderChainNodes(chain) {
    const nodes = chain['节点'] || [];
    if (nodes.length === 0) return '<div class="text-muted" style="font-size:0.85rem;margin-bottom:12px;">暂无思考节点</div>';

    let html = '<div class="chain-timeline">';
    nodes.forEach(node => {
      const typeClass = 'type-' + (node['类型'] || '问题');
      html += `
        <div class="chain-node ${typeClass}">
          <div class="chain-node-header">
            <span class="chain-node-level">L${node['层级'] || 0}</span>
            <span class="badge badge-${getNodeBadgeClass(node['类型'])}">${Utils.escapeHtml(node['类型'] || '问题')}</span>
            <div style="flex:1;"></div>
            <div class="list-item-actions">
              <button class="btn btn-sm" data-action="edit-node" data-chain-id="${chain.id}" data-node-id="${node.id}">编辑</button>
              <button class="btn btn-sm btn-danger" data-action="delete-node" data-chain-id="${chain.id}" data-node-id="${node.id}">&times;</button>
            </div>
          </div>
          <div class="chain-node-content">${Utils.escapeHtml(node['内容'] || '')}</div>
          ${node['思考时间'] ? '<div class="chain-node-time">' + Utils.escapeHtml(Utils.formatDate(node['思考时间'])) + '</div>' : ''}
        </div>`;
    });
    html += '</div>';
    return html;
  }

  function getNodeBadgeClass(type) {
    const map = { '问题': 'yellow', '假设': 'magenta', '推理': 'cyan', '结论': 'green', '证据': 'orange' };
    return map[type] || 'cyan';
  }

  function bindThoughtEvents() {
    // 搜索
    const filterInput = document.getElementById('thought-filter');
    if (filterInput) {
      filterInput.addEventListener('input', Utils.debounce(() => {
        const keyword = filterInput.value.trim().toLowerCase();
        document.querySelectorAll('#chain-list .card').forEach(card => {
          const text = card.textContent.toLowerCase();
          card.style.display = !keyword || text.includes(keyword) ? '' : 'none';
        });
      }, 200));
    }

    // 新建思路链
    document.getElementById('add-chain').addEventListener('click', () => {
      openChainModal(null);
    });

    // 编辑/删除思路链
    document.querySelectorAll('[data-action="edit-chain"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const data = ThoughtChain.getAll();
        const chain = data.chains.find(c => c.id === btn.dataset.id);
        if (chain) openChainModal(chain);
      });
    });

    document.querySelectorAll('[data-action="delete-chain"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const confirmed = await Utils.showConfirm('确定要删除这条思路链吗？');
        if (confirmed) {
          ThoughtChain.remove(btn.dataset.id);
          Utils.showToast('已删除', 'success');
          renderThoughtChain();
        }
      });
    });

    // 添加节点
    document.querySelectorAll('[data-action="add-node"]').forEach(btn => {
      btn.addEventListener('click', () => {
        openNodeModal(btn.dataset.chainId, null);
      });
    });

    // 编辑/删除节点
    document.querySelectorAll('[data-action="edit-node"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openNodeModal(btn.dataset.chainId, btn.dataset.nodeId);
      });
    });

    document.querySelectorAll('[data-action="delete-node"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const confirmed = await Utils.showConfirm('确定要删除这个节点吗？');
        if (confirmed) {
          ThoughtChain.removeNode(btn.dataset.chainId, btn.dataset.nodeId);
          Utils.showToast('节点已删除', 'success');
          renderThoughtChain();
        }
      });
    });
  }

  function openChainModal(existingChain) {
    const isEdit = !!existingChain;
    const title = isEdit ? '编辑思路链' : '新建思路链';

    let bodyHtml = `<form id="chain-form">
      <div class="form-group">
        <label class="form-label">标题 *</label>
        <input class="form-input" name="标题" value="${Utils.escapeHtml(isEdit ? existingChain['标题'] : '')}" placeholder="思路链标题">
      </div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-select" name="状态">
          <option${(isEdit && existingChain['状态'] === '进行中') ? ' selected' : ''}>进行中</option>
          <option${(isEdit && existingChain['状态'] === '已完成') ? ' selected' : ''}>已完成</option>
          <option${(isEdit && existingChain['状态'] === '暂停') ? ' selected' : ''}>暂停</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">结论</label>
        <textarea class="form-textarea" name="结论" placeholder="思路链的最终结论">${Utils.escapeHtml(isEdit ? existingChain['结论'] : '')}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">标签（逗号分隔）</label>
        <input class="form-input" name="标签" value="${Utils.escapeHtml(isEdit ? (existingChain['标签'] || []).join(', ') : '')}" placeholder="如：技术, 职业规划">
      </div>
    </form>`;

    const footerHtml = `
      <button class="btn" id="modal-cancel-btn">取消</button>
      <button class="btn btn-primary" id="modal-save-btn">${isEdit ? '保存修改' : '创建'}</button>
    `;

    showModal(title, bodyHtml, footerHtml);

    document.getElementById('modal-cancel-btn').onclick = hideModal;
    document.getElementById('modal-save-btn').onclick = () => {
      const form = document.getElementById('chain-form');
      const titleVal = form.querySelector('[name="标题"]').value.trim();
      if (!titleVal) {
        Utils.showToast('标题为必填项', 'error');
        form.querySelector('[name="标题"]').style.borderColor = 'var(--neon-red)';
        return;
      }

      const tagsStr = form.querySelector('[name="标签"]').value.trim();
      const tags = tagsStr ? tagsStr.split(/[,，]/).map(t => t.trim()).filter(Boolean) : [];

      const data = {
        '标题': titleVal,
        '状态': form.querySelector('[name="状态"]').value,
        '结论': form.querySelector('[name="结论"]').value.trim(),
        '标签': tags
      };

      if (isEdit) {
        ThoughtChain.update(existingChain.id, data);
        Utils.showToast('思路链已更新', 'success');
      } else {
        ThoughtChain.add(data);
        Utils.showToast('思路链已创建', 'success');
      }
      hideModal();
      renderThoughtChain();
    };
  }

  function openNodeModal(chainId, existingNode) {
    const isEdit = !!existingNode;
    const title = isEdit ? '编辑节点' : '添加节点';

    let bodyHtml = `<form id="node-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">类型</label>
          <select class="form-select" name="类型">
            <option${(isEdit && existingNode['类型'] === '问题') ? ' selected' : ''}>问题</option>
            <option${(isEdit && existingNode['类型'] === '假设') ? ' selected' : ''}>假设</option>
            <option${(isEdit && existingNode['类型'] === '推理') ? ' selected' : ''}>推理</option>
            <option${(isEdit && existingNode['类型'] === '结论') ? ' selected' : ''}>结论</option>
            <option${(isEdit && existingNode['类型'] === '证据') ? ' selected' : ''}>证据</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">层级</label>
          <input class="form-input" type="number" name="层级" value="${isEdit ? existingNode['层级'] : 0}" min="0" max="10">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">内容 *</label>
        <textarea class="form-textarea" name="内容" placeholder="思考内容">${Utils.escapeHtml(isEdit ? existingNode['内容'] : '')}</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">思考时间</label>
        <input class="form-input" name="思考时间" value="${Utils.escapeHtml(isEdit ? existingNode['思考时间'] : Utils.todayStr())}" placeholder="YYYY-MM-DD HH:MM">
      </div>
    </form>`;

    const footerHtml = `
      <button class="btn" id="modal-cancel-btn">取消</button>
      <button class="btn btn-primary" id="modal-save-btn">${isEdit ? '保存修改' : '添加节点'}</button>
    `;

    showModal(title, bodyHtml, footerHtml);

    document.getElementById('modal-cancel-btn').onclick = hideModal;
    document.getElementById('modal-save-btn').onclick = () => {
      const form = document.getElementById('node-form');
      const contentVal = form.querySelector('[name="内容"]').value.trim();
      if (!contentVal) {
        Utils.showToast('内容为必填项', 'error');
        form.querySelector('[name="内容"]').style.borderColor = 'var(--neon-red)';
        return;
      }

      const data = {
        '类型': form.querySelector('[name="类型"]').value,
        '层级': parseInt(form.querySelector('[name="层级"]').value) || 0,
        '内容': contentVal,
        '思考时间': form.querySelector('[name="思考时间"]').value.trim()
      };

      if (isEdit) {
        ThoughtChain.updateNode(chainId, existingNode.id, data);
        Utils.showToast('节点已更新', 'success');
      } else {
        ThoughtChain.addNode(chainId, data);
        Utils.showToast('节点已添加', 'success');
      }
      hideModal();
      renderThoughtChain();
    };
  }

  // ---- 洞察中心视图 ----

  function renderInsightCenter() {
    const data = InsightCenter.getAll();
    const items = data.items || [];

    let html = `
      <div class="page-header">
        <div class="page-title">洞察中心</div>
        <div class="page-desc">个人认知结论库 - 收集、验证和管理关于自己的深层洞察</div>
      </div>
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="filter-input" id="insight-filter" placeholder="搜索洞察...">
          <select class="form-select" id="insight-status-filter" style="width:120px;padding:6px 10px;">
            <option value="">全部状态</option>
            <option value="候选">候选</option>
            <option value="待验证">待验证</option>
            <option value="已验证">已验证</option>
            <option value="已废弃">已废弃</option>
          </select>
          <select class="form-select" id="insight-confidence-filter" style="width:120px;padding:6px 10px;">
            <option value="">全部可信度</option>
            <option value="低">低</option>
            <option value="中">中</option>
            <option value="高">高</option>
          </select>
        </div>
        <div class="toolbar-right">
          <button class="btn btn-success" id="run-analysis">运行分析</button>
          <button class="btn btn-primary" id="add-insight">+ 新增洞察</button>
        </div>
      </div>
      <div id="insight-list">`;

    if (items.length === 0) {
      html += `<div class="empty-state"><div class="empty-state-icon">&#128161;</div><div class="empty-state-text">暂无洞察记录，点击「运行分析」生成候选洞察，或手动添加</div></div>`;
    } else {
      items.forEach(item => {
        const statusBadgeClass = getInsightStatusBadgeClass(item['状态']);
        const confidenceBadgeClass = getInsightConfidenceBadgeClass(item['可信度']);
        const sourceBadgeClass = item['来源类型'] === '系统生成' ? 'badge-cyan' : (item['来源类型'] === '混合修正' ? 'badge-magenta' : 'badge-green');
        html += `
          <div class="list-item insight-item" data-id="${item.id}" data-status="${Utils.escapeHtml(item['状态'])}" data-confidence="${Utils.escapeHtml(item['可信度'])}">
            <div class="list-item-header">
              <div class="list-item-title">
                <span class="text-cyan" style="font-weight:600;">${Utils.escapeHtml(item['标题'] || '未命名洞察')}</span>
              </div>
              <div class="list-item-meta">
                <span class="badge ${statusBadgeClass}">${Utils.escapeHtml(item['状态'] || '待验证')}</span>
                <span class="badge ${confidenceBadgeClass}">${Utils.escapeHtml(item['可信度'] || '中')}</span>
                <span class="badge ${sourceBadgeClass}">${Utils.escapeHtml(item['来源类型'] || '用户创建')}</span>
              </div>
            </div>
            ${item['最终结论'] ? '<div style="margin-top:8px;padding:8px 12px;background:rgba(0,240,255,0.06);border-left:3px solid var(--neon-cyan);border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:0.88rem;color:var(--text-primary);line-height:1.6;">' + Utils.escapeHtml(item['最终结论']) + '</div>' : ''}
            ${(item['标签'] || []).length > 0 ? '<div style="margin-top:6px;">' + item['标签'].map(t => '<span class="tag">' + Utils.escapeHtml(t) + '</span>').join('') + '</div>' : ''}
            <div class="list-item-detail">
              ${renderInsightDetail(item)}
            </div>
          </div>`;
      });
    }

    html += '</div>';
    setPage(html);
    bindInsightEvents();
  }

  function getInsightStatusBadgeClass(status) {
    const map = {
      '候选': 'badge-yellow',
      '待验证': 'badge-orange',
      '已验证': 'badge-green',
      '已废弃': 'badge-red'
    };
    return map[status] || 'badge-cyan';
  }

  function getInsightConfidenceBadgeClass(confidence) {
    const map = {
      '低': 'badge-red',
      '中': 'badge-yellow',
      '高': 'badge-green'
    };
    return map[confidence] || 'badge-cyan';
  }

  function renderInsightDetail(item) {
    let html = '';

    // 初始假设
    if (item['初始假设']) {
      html += `<div class="mb-16"><strong class="text-secondary" style="font-size:0.85rem;">初始假设：</strong><div style="font-size:0.88rem;margin-top:4px;color:var(--text-primary);line-height:1.6;">${Utils.escapeHtml(item['初始假设'])}</div></div>`;
    }

    // 证据链（结构化列表）
    if (item['证据链'] && item['证据链'].length > 0) {
      html += '<div class="mb-16"><strong class="text-secondary" style="font-size:0.85rem;">证据链：</strong>';
      html += '<div style="margin-top:6px;">';
      item['证据链'].forEach(e => {
        html += `<div class="evidence-item" style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:4px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem;">
          <span class="evidence-module" style="color:var(--neon-cyan);font-family:var(--font-mono);font-size:0.78rem;">[${Utils.escapeHtml(e.module || '未知')}]</span>
          <span class="evidence-title" style="color:var(--text-primary);font-weight:500;">${Utils.escapeHtml(e.title || '未命名')}</span>
          <span class="evidence-id" style="color:var(--text-muted);font-family:var(--font-mono);font-size:0.75rem;">${Utils.escapeHtml(e.recordId || '')}</span>
        </div>`;
        if (e['摘要']) {
          html += `<div style="font-size:0.8rem;color:var(--text-secondary);padding:2px 0 6px 18px;line-height:1.5;">${Utils.escapeHtml(e['摘要'])}</div>`;
        }
      });
      html += '</div></div>';
    }

    // 验证过程
    if (item['验证过程']) {
      html += `<div class="mb-16"><strong class="text-secondary" style="font-size:0.85rem;">验证过程：</strong><div style="font-size:0.88rem;margin-top:4px;color:var(--text-primary);line-height:1.6;">${Utils.escapeHtml(item['验证过程'])}</div></div>`;
    }

    // 洞察内容
    if (item['洞察内容']) {
      html += `<div class="mb-16" style="font-size:0.9rem;line-height:1.7;color:var(--text-secondary);">${Utils.escapeHtml(item['洞察内容'])}</div>`;
    }

    // 来源记录（结构化列表）
    if (item['来源记录'] && item['来源记录'].length > 0) {
      html += '<div class="mb-16"><strong class="text-secondary" style="font-size:0.85rem;">来源记录：</strong>';
      html += '<div style="margin-top:6px;">';
      item['来源记录'].forEach(r => {
        if (typeof r === 'object') {
          html += `<div class="evidence-item" style="display:flex;align-items:center;gap:8px;padding:6px 10px;margin-bottom:4px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem;">
            <span class="evidence-module" style="color:var(--neon-magenta);font-family:var(--font-mono);font-size:0.78rem;">[${Utils.escapeHtml(r.module || '未知')}]</span>
            <span class="evidence-title" style="color:var(--text-primary);">${Utils.escapeHtml(r.title || r.recordId || '未命名')}</span>
            <span class="evidence-id" style="color:var(--text-muted);font-family:var(--font-mono);font-size:0.75rem;">${Utils.escapeHtml(r.recordId || '')}</span>
          </div>`;
        } else {
          html += `<span class="tag">${Utils.escapeHtml(r)}</span>`;
        }
      });
      html += '</div></div>';
    }

    // 发现时间
    html += `<div style="font-size:0.8rem;color:var(--text-muted);margin-top:8px;">发现时间：${Utils.escapeHtml(Utils.formatDate(item['发现时间']))}</div>`;

    html += `
      <div class="btn-group mt-16">
        <button class="btn btn-sm" data-action="edit-insight" data-id="${item.id}">编辑</button>
        <button class="btn btn-sm btn-danger" data-action="delete-insight" data-id="${item.id}">删除</button>
      </div>`;

    return html;
  }

  function bindInsightEvents() {
    // 展开/折叠
    document.querySelectorAll('.insight-item').forEach(item => {
      item.querySelector('.list-item-header').addEventListener('click', (e) => {
        if (e.target.closest('.list-item-actions')) return;
        item.classList.toggle('expanded');
      });
    });

    // 新增洞察
    document.getElementById('add-insight').addEventListener('click', () => {
      openInsightModal(null);
    });

    // 运行分析
    document.getElementById('run-analysis').addEventListener('click', () => {
      const candidates = AnalysisEngine.generateInsightCandidates();
      const behaviorStats = AnalysisEngine.runBehaviorAnalysis();
      const decisionStats = AnalysisEngine.runDecisionAnalysis();
      const thinkingStats = AnalysisEngine.runThinkingAnalysis();

      const hasData = (behaviorStats.项目总数 + decisionStats.决策总数 + thinkingStats.思路链总数) > 0;

      let bodyHtml = '<div style="max-height:60vh;overflow-y:auto;">';

      // 区域一：分析统计概览
      bodyHtml += '<div style="margin-bottom:20px;padding:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);">';
      bodyHtml += '<div style="font-family:var(--font-mono);font-size:0.9rem;color:var(--neon-cyan);font-weight:600;margin-bottom:12px;">分析统计概览</div>';

      if (!hasData) {
        bodyHtml += '<div style="color:var(--text-secondary);font-size:0.88rem;padding:16px;text-align:center;">暂无足够数据生成洞察，请先记录一些决策、行为或思路。</div>';
      } else {
        // 行为分析
        bodyHtml += '<div style="margin-bottom:12px;">';
        bodyHtml += '<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:4px;">行为分析</div>';
        bodyHtml += `<div style="font-size:0.88rem;color:var(--text-primary);">项目总数 ${behaviorStats.项目总数} | 完成率 ${behaviorStats.完成率} | 中断率 ${behaviorStats.中断率}</div>`;
        bodyHtml += '</div>';

        // 决策分析
        bodyHtml += '<div style="margin-bottom:12px;">';
        bodyHtml += '<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:4px;">决策分析</div>';
        bodyHtml += `<div style="font-size:0.88rem;color:var(--text-primary);">决策总数 ${decisionStats.决策总数}`;
        if (decisionStats.高频决策原因.length > 0) {
          bodyHtml += ' | 高频原因：' + decisionStats.高频决策原因.slice(0, 3).map(r => r.原因 + '(' + r.次数 + ')').join('、');
        }
        const resultEntries = Object.entries(decisionStats.决策结果分布 || {});
        if (resultEntries.length > 0) {
          bodyHtml += ' | 结果分布：' + resultEntries.map(([k, v]) => k + '(' + v + ')').join('、');
        }
        bodyHtml += '</div></div>';

        // 思路分析
        bodyHtml += '<div style="margin-bottom:12px;">';
        bodyHtml += '<div style="font-size:0.82rem;color:var(--text-muted);margin-bottom:4px;">思路分析</div>';
        bodyHtml += `<div style="font-size:0.88rem;color:var(--text-primary);">思路链 ${thinkingStats.思路链总数} | 已闭环 ${thinkingStats.已闭环} | 进行中 ${thinkingStats.进行中}`;
        if (thinkingStats.高频主题.length > 0) {
          bodyHtml += ' | 高频主题：' + thinkingStats.高频主题.slice(0, 3).map(t => t.主题 + '(' + t.次数 + ')').join('、');
        }
        bodyHtml += '</div></div>';
      }
      bodyHtml += '</div>';

      // 区域二：候选洞察列表
      if (candidates.length > 0) {
        bodyHtml += '<div style="font-family:var(--font-mono);font-size:0.9rem;color:var(--neon-green);font-weight:600;margin-bottom:12px;">候选洞察</div>';
        bodyHtml += '<p class="text-secondary" style="font-size:0.85rem;margin-bottom:12px;">以下是从现有数据中分析出的候选洞察，勾选后可一键添加到洞察中心：</p>';
        candidates.forEach((c, i) => {
          bodyHtml += `
            <div style="padding:12px;margin-bottom:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                <input type="checkbox" id="candidate_${i}" data-index="${i}" style="accent-color:var(--neon-cyan);" checked>
                <label for="candidate_${i}" style="cursor:pointer;font-weight:500;">${Utils.escapeHtml(c['标题'])}</label>
              </div>
              ${c['初始假设'] ? '<div style="font-size:0.82rem;color:var(--neon-yellow);padding-left:24px;margin-bottom:4px;">初始假设：' + Utils.escapeHtml(c['初始假设']) + '</div>' : ''}
              <div style="font-size:0.82rem;color:var(--text-secondary);padding-left:24px;">${Utils.escapeHtml(c['洞察内容'])}</div>
              <div style="font-size:0.78rem;color:var(--text-muted);padding-left:24px;margin-top:4px;">来源：${Utils.escapeHtml(c['来源模块'])} | 可信度：${Utils.escapeHtml(c['可信度'])} | 来源类型：${Utils.escapeHtml(c['来源类型'])}</div>
            </div>`;
        });
      }

      bodyHtml += '</div>';

      const footerHtml = `
        <button class="btn" id="modal-cancel-btn">取消</button>
        ${candidates.length > 0 ? '<button class="btn btn-primary" id="modal-add-candidates">添加到洞察中心</button>' : ''}
      `;

      showModal('分析结果', bodyHtml, footerHtml);

      document.getElementById('modal-cancel-btn').onclick = hideModal;
      const addBtn = document.getElementById('modal-add-candidates');
      if (addBtn) {
        addBtn.onclick = () => {
          let added = 0;
          document.querySelectorAll('[data-index]').forEach(cb => {
            if (cb.checked) {
              const idx = parseInt(cb.dataset.index);
              const c = candidates[idx];
              InsightCenter.add({
                '标题': c['标题'],
                '初始假设': c['初始假设'] || '',
                '证据链': c['证据链'] || [],
                '验证过程': c['验证过程'] || '',
                '最终结论': c['最终结论'] || '',
                '洞察内容': c['洞察内容'],
                '来源记录': c['来源记录'] || [],
                '发现时间': new Date().toISOString(),
                '标签': [],
                '可信度': c['可信度'],
                '状态': '候选',
                '来源类型': c['来源类型']
              });
              added++;
            }
          });
          hideModal();
          Utils.showToast(`已添加 ${added} 个候选洞察`, 'success');
          renderInsightCenter();
        };
      }
    });

    // 编辑/删除
    document.querySelectorAll('[data-action="edit-insight"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const item = InsightCenter.getById(btn.dataset.id);
        if (item) openInsightModal(item);
      });
    });

    document.querySelectorAll('[data-action="delete-insight"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const confirmed = await Utils.showConfirm('确定要删除这条洞察吗？');
        if (confirmed) {
          InsightCenter.remove(btn.dataset.id);
          Utils.showToast('已删除', 'success');
          renderInsightCenter();
        }
      });
    });

    // 搜索
    const filterInput = document.getElementById('insight-filter');
    if (filterInput) {
      filterInput.addEventListener('input', Utils.debounce(() => {
        const keyword = filterInput.value.trim().toLowerCase();
        document.querySelectorAll('.insight-item').forEach(item => {
          const text = item.textContent.toLowerCase();
          item.style.display = !keyword || text.includes(keyword) ? '' : 'none';
        });
      }, 200));
    }

    // 状态筛选
    const statusFilter = document.getElementById('insight-status-filter');
    if (statusFilter) {
      statusFilter.addEventListener('change', applyInsightFilters);
    }

    // 可信度筛选
    const confidenceFilter = document.getElementById('insight-confidence-filter');
    if (confidenceFilter) {
      confidenceFilter.addEventListener('change', applyInsightFilters);
    }
  }

  function applyInsightFilters() {
    const statusVal = document.getElementById('insight-status-filter').value;
    const confidenceVal = document.getElementById('insight-confidence-filter').value;
    document.querySelectorAll('.insight-item').forEach(item => {
      let show = true;
      if (statusVal && item.dataset.status !== statusVal) show = false;
      if (confidenceVal && item.dataset.confidence !== confidenceVal) show = false;
      item.style.display = show ? '' : 'none';
    });
  }

  function openInsightModal(existingItem) {
    const isEdit = !!existingItem;
    const title = isEdit ? '编辑洞察' : '新增洞察';

    // 准备证据链和来源记录的初始数据

    document.getElementById('modal-cancel-btn').onclick = hideModal;
    document.getElementById('modal-save-btn').onclick = () => {
      const form = document.getElementById('insight-form');
      const titleVal = form.querySelector('[name="标题"]').value.trim();

      if (!titleVal) {
        Utils.showToast('标题为必填项', 'error');

      // 收集证据链
      const evidenceChainData = [];
      document.querySelectorAll('.evidence-form-row').forEach(row => {

        const title = form.querySelector(`[name="来源记录_title_${idx}"]`).value.trim();
        if (recordId || title) {
          sourceRecordData.push({ module, recordId, title });
        }
      });

      const tagsStr = form.querySelector('[name="标签"]').value.trim();
      const tags = tagsStr ? tagsStr.split(/[,，]/).map(t => t.trim()).filter(Boolean) : [];

      const data = {
        '标题': titleVal,
        '初始假设': form.querySelector('[name="初始假设"]').value.trim(),
        '证据链': evidenceChainData,
        '验证过程': form.querySelector('[name="验证过程"]').value.trim(),
        '最终结论': form.querySelector('[name="最终结论"]').value.trim(),
        '洞察内容': form.querySelector('[name="洞察内容"]').value.trim(),
        '来源记录': sourceRecordData,
        '发现时间': form.querySelector('[name="发现时间"]').value ? new Date(form.querySelector('[name="发现时间"]').value).toISOString() : new Date().toISOString(),

        '状态': form.querySelector('[name="状态"]').value,

        InsightCenter.update(existingItem.id, data);
        Utils.showToast('洞察已更新', 'success');
      } else {
        InsightCenter.add(data);
        Utils.showToast('洞察已添加', 'success');
      }
      hideModal();
      renderInsightCenter();

  // ---- 行为观察视图 ----

  function renderBehaviorObserver() {
    const data = BehaviorObserver.getAll();
    const items = data.items || [];

    let html = `
      <div class="page-header">
        <div class="page-title">行为观察</div>
        <div class="page-desc">观察和记录你的行为模式，分析中断和放弃的原因</div>
      </div>
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="filter-input" id="behavior-filter" placeholder="搜索...">
          <select class="form-select" id="behavior-status-filter" style="width:140px;padding:6px 10px;">
            <option value="">全部状态</option>
            <option value="持续推进">持续推进</option>
            <option value="中断">中断</option>
            <option value="已放弃">已放弃</option>
            <option value="已完成">已完成</option>
          </select>
        </div>
        <div class="toolbar-right">
          <button class="btn btn-primary" id="add-behavior">+ 新增记录</button>
        </div>
      </div>
      <div id="behavior-list">`;

    if (items.length === 0) {
      html += `<div class="empty-state"><div class="empty-state-icon">&#128065;</div><div class="empty-state-text">暂无行为观察记录，点击上方按钮开始记录</div></div>`;
    } else {
      items.forEach(item => {
        const statusBadge = getStatusBadge(item['状态']);
        const categoryBadge = getCategoryBadge(item['类别']);
        html += `
          <div class="list-item behavior-item" data-id="${item.id}" data-status="${Utils.escapeHtml(item['状态'])}">
            <div class="list-item-header">
              <div class="list-item-title">
                <span>${Utils.escapeHtml(item['事情'] || '未命名')}</span>
              </div>
              <div class="list-item-meta">
                ${categoryBadge}
                ${statusBadge}
              </div>
            </div>
            <div style="margin-top:6px;font-size:0.82rem;color:var(--text-muted);">
              ${item['开始时间'] ? '开始：' + Utils.escapeHtml(Utils.formatDateShort(item['开始时间'])) : ''}
              ${item['持续时间描述'] ? ' | ' + Utils.escapeHtml(item['持续时间描述']) : ''}
            </div>
            ${(item['标签'] || []).length > 0 ? '<div style="margin-top:6px;">' + item['标签'].map(t => '<span class="tag">' + Utils.escapeHtml(t) + '</span>').join('') + '</div>' : ''}
            <div class="list-item-detail">
              ${renderBehaviorDetail(item)}
            </div>
          </div>`;
      });
    }

    html += '</div>';
    setPage(html);
    bindBehaviorEvents();
  }

  function getStatusBadge(status) {
    const map = {
      '持续推进': 'badge-green',
      '中断': 'badge-yellow',
      '已放弃': 'badge-red',
      '已完成': 'badge-cyan'
    };
    return '<span class="badge ' + (map[status] || 'badge-cyan') + '">' + Utils.escapeHtml(status || '未知') + '</span>';
  }

  function getCategoryBadge(category) {
    const map = {
      '学习': 'badge-cyan',
      '工作': 'badge-magenta',
      '运动': 'badge-green',
      '创作': 'badge-yellow',
      '社交': 'badge-orange'
    };
    return '<span class="badge ' + (map[category] || 'badge-cyan') + '">' + Utils.escapeHtml(category || '其他') + '</span>';
  }

  function renderBehaviorDetail(item) {
    let html = '';

    // 中断分析
    const interrupt = item['中断分析'];
    if (interrupt) {
      html += '<div class="mb-16" style="padding:12px;background:rgba(255,204,0,0.04);border:1px solid rgba(255,204,0,0.15);border-radius:var(--radius-sm);">';
      html += '<strong class="text-yellow" style="font-size:0.85rem;">中断分析</strong>';
      const events = interrupt['中断前发生了什么'] || [];
      if (events.length > 0) {
        html += '<div style="margin-top:8px;">';
        events.forEach(e => {
          html += `<div style="font-size:0.85rem;margin-top:4px;padding:6px;background:rgba(0,0,0,0.2);border-radius:var(--radius-sm);">
            <span class="text-muted">${Utils.escapeHtml(e['时间'] || '')}</span> - ${Utils.escapeHtml(e['事件'] || '')}
            ${e['影响'] ? '<br><span class="text-secondary" style="font-size:0.8rem;">影响：' + Utils.escapeHtml(e['影响']) + '</span>' : ''}
          </div>`;
        });
        html += '</div>';
      }
      if (interrupt['中断根本原因']) {
        html += `<div style="margin-top:8px;font-size:0.85rem;">根本原因：${Utils.escapeHtml(interrupt['中断根本原因'])}</div>`;
      }
      html += '</div>';
    }

    // 放弃分析
    const abandon = item['放弃分析'];
    if (abandon) {
      html += '<div class="mb-16" style="padding:12px;background:rgba(255,51,102,0.04);border:1px solid rgba(255,51,102,0.15);border-radius:var(--radius-sm);">';
      html += '<strong class="text-red" style="font-size:0.85rem;">放弃分析</strong>';
      if (typeof abandon === 'object') {
        Object.entries(abandon).forEach(([k, v]) => {
          if (v) html += `<div style="margin-top:4px;font-size:0.85rem;">${Utils.escapeHtml(k)}：${Utils.escapeHtml(v)}</div>`;
        });
      }
      html += '</div>';
    }

    // 经验总结
    if (item['经验总结']) {
      html += `<div class="mb-8" style="font-size:0.85rem;"><strong class="text-green">经验总结：</strong>${Utils.escapeHtml(item['经验总结'])}</div>`;
    }

    // 操作按钮
    html += `
      <div class="btn-group mt-16">
        <button class="btn btn-sm" data-action="edit-behavior" data-id="${item.id}">编辑</button>
        <button class="btn btn-sm btn-danger" data-action="delete-behavior" data-id="${item.id}">删除</button>
      </div>`;

    return html;
  }

  function bindBehaviorEvents() {
    // 展开/折叠
    document.querySelectorAll('.behavior-item').forEach(item => {
      item.querySelector('.list-item-header').addEventListener('click', (e) => {
        if (e.target.closest('.list-item-actions')) return;
        item.classList.toggle('expanded');
      });
    });

    // 新增
    document.getElementById('add-behavior').addEventListener('click', () => {
      openBehaviorModal(null);
    });

    // 编辑/删除
    document.querySelectorAll('[data-action="edit-behavior"]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const data = BehaviorObserver.getAll();
        const item = data.items.find(i => i.id === btn.dataset.id);
        if (item) openBehaviorModal(item);
      });
    });

    document.querySelectorAll('[data-action="delete-behavior"]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const confirmed = await Utils.showConfirm('确定要删除这条行为记录吗？');
        if (confirmed) {
          BehaviorObserver.remove(btn.dataset.id);
          Utils.showToast('已删除', 'success');
          renderBehaviorObserver();
        }
      });
    });

    // 搜索
    const filterInput = document.getElementById('behavior-filter');
    if (filterInput) {
      filterInput.addEventListener('input', Utils.debounce(() => {
        const keyword = filterInput.value.trim().toLowerCase();
        document.querySelectorAll('.behavior-item').forEach(item => {
          const text = item.textContent.toLowerCase();
          item.style.display = !keyword || text.includes(keyword) ? '' : 'none';
        });
      }, 200));
    }

    // 状态筛选
    const statusFilter = document.getElementById('behavior-status-filter');
    if (statusFilter) {
      statusFilter.addEventListener('change', () => {
        const val = statusFilter.value;
        document.querySelectorAll('.behavior-item').forEach(item => {
          if (!val) { item.style.display = ''; return; }
          item.style.display = item.dataset.status === val ? '' : 'none';
        });
      });
    }
  }

  function bindDataIOEvents() {
    // 导出
    document.getElementById('btn-export').addEventListener('click', () => {
      const exportData = {};
      Store.keys().forEach(key => {
        exportData[key] = Store.get(key);
      });

      const json = JSON.stringify(exportData, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'lifeos_backup_' + new Date().toISOString().slice(0, 10) + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      Utils.showToast('数据已导出', 'success');
    });

    // 选择导入文件
    let pendingImportData = null;
    document.getElementById('btn-import-select').addEventListener('click', () => {
      document.getElementById('import-file').click();
    });

    document.getElementById('import-file').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          pendingImportData = JSON.parse(ev.target.result);
          document.getElementById('import-options').style.display = 'block';
          Utils.showToast('文件已加载，请选择导入方式', 'info');
        } catch (err) {
          Utils.showToast('文件格式错误，请选择有效的JSON文件', 'error');
        }
      };
      reader.readAsText(file);
    });

    // 确认导入
    document.getElementById('btn-import-confirm').addEventListener('click', async () => {
      if (!pendingImportData) return;

      const mode = document.querySelector('input[name="import-mode"]:checked').value;
      const confirmed = await Utils.showConfirm(
        mode === 'overwrite'
          ? '完全覆盖将清除所有现有数据，确定继续吗？'
          : '将以合并方式导入数据，确定继续吗？'
      );

      if (!confirmed) return;

      if (mode === 'overwrite') {
        Store.keys().forEach(key => Store.remove(key));
      }

      Object.entries(pendingImportData).forEach(([key, value]) => {
        if (mode === 'merge') {
          const existing = Store.get(key);
          if (existing && typeof existing === 'object' && !Array.isArray(existing)) {
            if (existing.items && Array.isArray(value.items)) {
              // 合并items数组
              const existingIds = new Set(existing.items.map(i => i.id));
              value.items.forEach(item => {
                if (!existingIds.has(item.id)) {
                  existing.items.push(item);
                }
              });
              Store.set(key, existing);
            } else if (existing.chains && Array.isArray(value.chains)) {
              const existingIds = new Set(existing.chains.map(c => c.id));
              value.chains.forEach(chain => {
                if (!existingIds.has(chain.id)) {
                  existing.chains.push(chain);
                }
              });
              Store.set(key, existing);
            } else {
              // 简单对象合并
              Store.set(key, { ...existing, ...value });
            }
          } else {
            Store.set(key, value);
          }
        } else {
          Store.set(key, value);
        }
      });

      Store.flush();
      pendingImportData = null;
      document.getElementById('import-options').style.display = 'none';
      document.getElementById('import-file').value = '';
      Utils.showToast('数据导入成功', 'success');
      renderDataIO();
    });

    // 清除所有数据
    document.getElementById('btn-clear-all').addEventListener('click', async () => {
      const confirmed = await Utils.showConfirm('确定要清除所有LifeOS数据吗？此操作不可撤销！');
      if (confirmed) {
        Store.keys().forEach(key => Store.remove(key));
        Utils.showToast('所有数据已清除', 'success');
        renderDataIO();
      }
    });
  }

      html += '<option value="' + t + '"' + (item.更新类型 === t ? ' selected' : '') + '>' + t + '</option>';
    });
    html += '</select></div></div>';

    html += '<div class="form-group">';
    html += '<label class="form-label">更新内容</label>';
    html += '<textarea class="form-input" id="evo-content" rows="5" placeholder="描述本次更新的具体内容...">' + Utils.escapeHtml(item.更新内容 || '') + '</textarea>';
    html += '</div>';

    html += '<div class="form-group">';
    html += '<label class="form-label">更新原因</label>';
    html += '<textarea class="form-input" id="evo-reason" rows="3" placeholder="为什么需要这次更新？">' + Utils.escapeHtml(item.更新原因 || '') + '</textarea>';
    html += '</div>';

    html += '<div class="form-group">';
    html += '<label class="form-label">设计思路</label>';
    html += '<textarea class="form-input" id="evo-design" rows="3" placeholder="采用了什么设计思路？">' + Utils.escapeHtml(item.设计思路 || '') + '</textarea>';
    html += '</div>';

    html += '<div class="form-group">';
    html += '<label class="form-label">预期效果</label>';
    html += '<textarea class="form-input" id="evo-effect" rows="3" placeholder="预期达到什么效果？">' + Utils.escapeHtml(item.预期效果 || '') + '</textarea>';
    html += '</div>';

    html += '<div class="form-group">';
    html += '<label class="form-label">下一步计划</label>';
    html += '<textarea class="form-input" id="evo-next" rows="2" placeholder="下一步准备做什么？">' + Utils.escapeHtml(item.下一步计划 || '') + '</textarea>';
    html += '</div>';

    html += '<div class="form-group">';
    html += '<label class="form-label">标签</label>';
    html += '<input class="form-input" id="evo-tags" value="' + Utils.escapeHtml((item.标签 || []).join(', ')) + '" placeholder="如：分析层, 架构升级">';
    html += '</div>';

    html += '</div>';
    html += '<div class="modal-footer">';
    html += '<button class="btn btn-outline" id="modal-cancel-btn">取消</button>';
    html += '<button class="btn btn-primary" id="modal-save-btn">' + (isEdit ? '保存修改' : '添加记录') + '</button>';
    html += '</div>';

    document.getElementById('modal-container').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('active');

    document.getElementById('modal-close-btn').onclick = hideModal;
    document.getElementById('modal-cancel-btn').onclick = hideModal;
    document.getElementById('modal-save-btn').onclick = function() {
      var version = document.getElementById('evo-version').value.trim();
      if (!version) { alert('请输入版本号'); return; }

      var entry = {
        版本号: version,
        更新时间: document.getElementById('evo-date').value,
        开发状态: document.getElementById('evo-status').value,
        更新类型: document.getElementById('evo-type').value,
        更新内容: document.getElementById('evo-content').value,
        更新原因: document.getElementById('evo-reason').value,
        设计思路: document.getElementById('evo-design').value,
        预期效果: document.getElementById('evo-effect').value,
        下一步计划: document.getElementById('evo-next').value,
        标签: document.getElementById('evo-tags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean)
      };

      if (isEdit) {
        EvolutionLog.update(editId, entry);
      } else {
        EvolutionLog.add(entry);
      }
      hideModal();
      renderEvolutionLog();
      Dashboard.refresh();
    };
  }

  return {
    renderDashboard,
    renderUserModel,
    renderDecisionLog,
    renderThoughtChain,
    renderBehaviorObserver,
    renderInsightCenter,
    renderDataIO,
    renderEvolutionLog
  };
  })();

  // ============================================
  // 应用入口：App
  // ============================================

  const App = (() => {
    function init() {
      console.log('[LifeOS] App Start');

      // 运行数据版本迁移
      console.log('[LifeOS] Migration Start');
      Migration.runMigrations();
      console.log('[LifeOS] Migration Complete');

      // 注册路由
      console.log('[LifeOS] Router Init');
      Router.register('dashboard', UI.renderDashboard);
      Router.register('user-model', UI.renderUserModel);
      Router.register('decisions', UI.renderDecisionLog);
      Router.register('thoughts', UI.renderThoughtChain);
      Router.register('behaviors', UI.renderBehaviorObserver);
      Router.register('insights', UI.renderInsightCenter);
      Router.register('data-io', UI.renderDataIO);
      Router.register('evolution', UI.renderEvolutionLog);
      console.log('[LifeOS] Router Init Complete');

      // 导航点击事件
      console.log('[LifeOS] Event Bind Start');
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
          Router.navigate(item.dataset.route);
          // 移动端关闭侧边栏
          document.getElementById('sidebar').classList.remove('open');
        });
      });

      // 移动端汉堡菜单
      document.getElementById('hamburger-btn').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
      });

      // Ctrl+S 保存
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          Store.flush();
          Utils.showToast('所有数据已保存', 'success');
        }
      });

      // 点击页面外关闭侧边栏（移动端）
      document.getElementById('main-content').addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          document.getElementById('sidebar').classList.remove('open');
        }
      });

      // ESC关闭弹窗
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          hideModal();
          document.getElementById('confirm-overlay').classList.remove('active');
        }
      });
      console.log('[LifeOS] Event Bind Complete');

      // 初始化路由
      Router.init();

      console.log('[LifeOS] Render Complete');
      console.log('[LifeOS] App Initialized Successfully');
    }

    return { init };
  })();

  // 暴露到全局
  window.LifeOS = {
    Store, EventBus, Router, Utils,
    UserModel, DecisionLog, ThoughtChain, BehaviorObserver, InsightCenter, Dashboard,
    AnalysisEngine, Migration, EvolutionLog,
    UI, App
  };

  // 启动应用
  document.addEventListener('DOMContentLoaded', App.init);

})();
</script>
</body>
</html>
